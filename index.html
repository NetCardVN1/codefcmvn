<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Mobile VN - Giftcode Mới Nhất</title>
    <style>
        :root {
            --primary-color: #00ff88; /* Màu xanh lá đặc trưng bóng đá */
            --bg-color: #0f1215;
            --card-bg: #1e2329;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .header h1 {
            font-size: 24px;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .code-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .gift-info h3 {
            margin: 0;
            font-size: 18px;
            color: var(--primary-color);
        }

        .gift-details {
            font-size: 14px;
            color: #ccc;
            margin: 8px 0;
            line-height: 1.4;
        }

        .status {
            display: inline-block;
            background: #28a745;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .code-box {
            display: flex;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            border: 1px dashed #555;
        }

        .code-text {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
        }

        .copy-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }

        .copy-btn:hover {
            opacity: 0.8;
        }

        /* Toast thông báo */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--primary-color);
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>FC MOBILE VN</h1>
        <p>Trung tâm nhận Code chính thức</p>
    </div>

    <div class="code-card">
        <span class="status">CÒN HẠN</span>
        <div class="gift-info">
            <h3>CUNGDUAFCMLENTOP</h3>
            <div class="gift-details">
                • 15.000.000 Coins<br>
                • 2.000 Gems
            </div>
        </div>
        <div class="code-box">
            <span class="code-text" id="code1">CUNGDUAFCMLENTOP</span>
            <button class="copy-btn" onclick="copyCode('CUNGDUAFCMLENTOP')">SAO CHÉP</button>
        </div>
    </div>

    <div class="code-card">
        <span class="status">CÒN HẠN</span>
        <div class="gift-info">
            <h3>SONGDAUTOPDUOS</h3>
            <div class="gift-details">
                • Gói cầu thủ Top Duos (113 - 116)<br>
                • Trạng thái: Untrade (Không thể giao dịch)
            </div>
        </div>
        <div class="code-box">
            <span class="code-text" id="code2">SONGDAUTOPDUOS</span>
            <button class="copy-btn" onclick="copyCode('SONGDAUTOPDUOS')">SAO CHÉP</button>
        </div>
    </div>
</div>

<div id="toast">Đã sao chép thành công!</div>

<script>
    function copyCode(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        });
    }
</script>

</body>
</html>

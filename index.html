<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMaster - Giftcode FC Mobile</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">

    <style>
        :root {
            --primary-color: #00ff88;
            --bg-color: #0a0c0e;
            --card-bg: #1e2329;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .logo-app {
            width: 70px;
            height: 70px;
            margin-bottom: 10px;
            border-radius: 15px;
            box-shadow: 0 0 15px var(--primary-color);
        }

        .header {
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        /* --- THẺ CODE CÓ BANNER LÀM NỀN --- */
        .code-card {
            position: relative;
            background-image: url('banner.jpg'); /* Banner làm nền */
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden; /* Để lớp phủ không tràn ra ngoài bo góc */
            border: 2px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .code-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        /* Lớp phủ đen mờ để làm nổi bật chữ */
        .card-overlay {
            background: rgba(0, 0, 0, 0.7); /* Độ mờ 0.7 giúp nhìn rõ ảnh nền bên dưới */
            padding: 20px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            text-align: left;
        }

        .gift-info h3 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .gift-details {
            font-size: 14px;
            color: #eee;
            margin: 5px 0;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,1);
        }

        /* Khung copy */
        .code-box {
            display: flex;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 10px;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--primary-color);
            margin-top: 15px;
        }

        .code-text {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
        }

        .copy-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Thẻ hết hạn (làm tối đi hẳn) */
        .expired {
            filter: grayscale(1);
            opacity: 0.7;
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: var(--primary-color);
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            z-index: 99;
        }

        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo" class="logo-app">
    
    <div class="header">
        <h1>CodeMaster</h1>
        <p>Hệ thống Giftcode xịn nhất VN</p>
    </div>

    <div class="code-card">
        <div class="card-overlay">
            <div class="gift-info">
                <h3>SONGDAUTOPDUOS</h3>
                <div class="gift-details">• Top Duos 113-116 (Untrade)</div>
                <div class="gift-details">• W.Rooney (112 +5)</div>
            </div>
            
            <div class="code-box">
                <span class="code-text">SONGDAUTOPDUOS</span>
                <button class="copy-btn" onclick="copyCode('SONGDAUTOPDUOS')">COPY</button>
            </div>
        </div>
    </div>

    <div class="code-card expired" style="background-image: none; background-color: #161a1e;">
        <div class="card-overlay">
            <div class="gift-info">
                <h3 style="color: #666;">CUNGDUAFCMLENTOP</h3>
                <div class="gift-details" style="color: #666;">• 15M Coins (HẾT HẠN)</div>
            </div>
            <div class="code-box" style="border-color: #444;">
                <span class="code-text" style="color: #666;">CUNGDUAFCMLENTOP</span>
                <button class="copy-btn" style="background:#444; color:#666" disabled>HẾT HẠN</button>
            </div>
        </div>
    </div>

</div>

<div id="toast">✅ Đã sao chép thành công!</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    window.onload = function() {
        if ("Notification" in window) {
            Notification.requestPermission().then(p => {
                if (p === "granted") sendNotification();
            });
        }
    };

    function sendNotification() {
        new Notification("🥳 FC Mobile có code mới rồi!", {
            body: "Mở app để copy code nhận quà ngay ní ơi!",
            icon: "logo.png"
        });
    }

    function copyCode(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
            sendNotification();
        });
    }
</script>
</body>
</html>

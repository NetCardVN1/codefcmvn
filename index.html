<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMaster - Giftcode FC Mobile</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">

    <style>
        :root {
            --primary-color: #00ff88;
            --bg-color: #0f1215;
            --card-bg: #1e2329;
            --text-color: #ffffff;
            --expired-bg: #161a1e;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .logo-app {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
            border-radius: 18px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            object-fit: cover;
        }

        .header {
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .header h1 {
            margin: 5px 0;
            font-size: 26px;
            text-transform: uppercase;
        }

        /* Thẻ quà tặng */
        .code-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .gift-info h3 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        /* Banner bên trong thẻ code */
        .inner-banner {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #444;
            display: block;
        }

        .gift-details {
            font-size: 14px;
            color: #ccc;
            margin: 4px 0;
            list-style: none;
            padding: 0;
        }

        /* Khung copy */
        .code-box {
            display: flex;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            justify-content: space-between;
            align-items: center;
            border: 1px dashed #555;
            margin-top: 15px;
        }

        .code-text {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 15px;
            color: #fff;
        }

        .copy-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .copy-btn:active {
            transform: scale(0.9);
        }

        /* Style cho Code Hết Hạn */
        .expired {
            opacity: 0.6;
            filter: grayscale(0.9);
            background-color: var(--expired-bg);
        }
        .expired h3 {
            text-decoration: line-through;
            color: #777 !important;
        }
        .expired .copy-btn {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* Toast thông báo */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: var(--primary-color);
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px 20px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            z-index: 999;
        }

        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="CodeMaster Logo" class="logo-app">
    
    <div class="header">
        <h1>CodeMaster</h1>
        <p>Cập nhật Code FC Mobile mới nhất</p>
    </div>

    <div class="code-card">
        <div class="gift-info">
            <h3>SONGDAUTOPDUOS</h3>
            
            <img src="banner.jpg" alt="Banner Quà Tặng" class="inner-banner">

            <div class="gift-details">• Top Duos 113-116 (Untrade)</div>
            <div class="gift-details">• W.Rooney (112 +5)</div>
        </div>
        <div class="code-box">
            <span class="code-text">SONGDAUTOPDUOS</span>
            <button class="copy-btn" onclick="copyCode('SONGDAUTOPDUOS')">COPY</button>
        </div>
    </div>

    <div class="code-card expired">
        <div class="gift-info">
            <h3>CUNGDUAFCMLENTOP</h3>
            <div class="gift-details">• 15M Coins (HẾT HẠN)</div>
            <div class="gift-details">• 2000 Gems (HẾT HẠN)</div>
        </div>
        <div class="code-box">
            <span class="code-text">CUNGDUAFCMLENTOP</span>
            <button class="copy-btn" disabled>HẾT HẠN</button>
        </div>
    </div>

</div>

<div id="toast">Đã sao chép thành công!</div>

<script>
    // Đăng ký Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // Tự động hỏi quyền Notification khi vào App
    window.addEventListener('load', () => {
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    sendNotification();
                }
            });
        }
    });

    function sendNotification() {
        new Notification("🥳 FC Mobile đã có code mới!", {
            body: "Vào ứng dụng sao chép quà ngay ní ơi!",
            icon: "logo.png"
        });
    }

    function copyCode(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
            
            // Hiện lại thông báo khi nhấn copy
            sendNotification();
        });
    }
</script>
</body>
</html>

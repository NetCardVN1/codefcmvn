<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMaster - Giftcode</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">

    <style>
        :root {
            --primary-color: #00ff88;
            --bg-color: #0f1215;
            --card-bg: #1e2329;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* Thêm Logo */
        .logo-app {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
            border-radius: 15px;
            box-shadow: 0 0 15px var(--primary-color);
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .code-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .gift-info h3 {
            margin: 0;
            color: var(--primary-color);
        }

        .gift-details {
            font-size: 14px;
            color: #ccc;
            margin: 8px 0;
        }

        .code-box {
            display: flex;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            justify-content: space-between;
            align-items: center;
            border: 1px dashed #555;
        }

        .copy-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--primary-color);
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            z-index: 10;
        }

        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo FC Mobile" class="logo-app">
    
    <div class="header">
        <h1>CodeMaster</h1>
        <p>Luôn cập nhật Code mới nhất cho bạn.</p>
    </div>

   <div class="code-card">
        <div class="gift-info">
            <h3>SONGDAUTOPDUOS</h3>
            <div class="gift-details">• Gói Top Duos (113 - 116)</div>
            <div class="gift-details">• Rooney (CAM - 117 +5) </div>
        </div>
        <div class="code-box">
            <span class="code-text">SONGDAUTOPDUOS</span>
            <button class="copy-btn" onclick="copyCode('SONGDAUTOPDUOS')">COPY</button>
        </div>
    </div>
</div>

<div class="code-card" style="border-color: #ff4d4f; background-color: #fff1f0; filter: grayscale(0.5);"> 
    <div class="gift-info"> 
        <h3 style="color: #ff4d4f; text-decoration: line-through;">CUNGDUAFCMLENTOP</h3> 
        <div class="gift-details" style="color: #ff4d4f;">• 15M Coins (HẾT HẠN)</div> 
        <div class="gift-details" style="color: #ff4d4f;">• 2000 Gems (HẾT HẠN)</div> 
    </div> 
    <div class="code-box" style="background: #ffa39e; border: 1px dashed #f5222d;"> 
        <span class="code-text" style="color: #fff; font-weight: bold;">CUNGDUAFCMLENTOP</span> 
        <button class="copy-btn" style="background: #8c8c8c; cursor: not-allowed;" disabled>HẾT HẠN</button> 
    </div> 
</div>


<div id="toast">Đã sao chép!</div>

<script>
    // Đăng ký Service Worker cho PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // 1. Tự động hỏi quyền khi vừa vào web
    window.onload = function() {
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    // Nếu đã cấp quyền, gửi thông báo chào mừng (cũng là để test)
                    sendNotification();
                }
            });
        }
    };

    function sendNotification() {
        new Notification("🥳 FC Mobile đã cho ra code mới rồi!", {
            body: "Hãy vào ứng dụng để sao chép và nhập code nhận quà ngay nào!",
            icon: "logo.png"
        });
    }

    function copyCode(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
            
            // Hiện lại thông báo khi copy (tùy chọn)
            sendNotification();
        });
    }
</script>
</body>
</html>
